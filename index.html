<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK GRID | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-blue { text-shadow: 0 0 15px #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div id="auth-box" class="glass p-10 rounded-[3rem] w-96 text-center border border-sky-500/20 shadow-2xl">
        <h2 id="auth-title" class="text-3xl font-black italic mb-6 neon-blue uppercase">Login</h2>
        
        <div class="space-y-4">
            <input id="u-id" type="text" placeholder="User ID" class="w-full bg-slate-900 p-4 rounded-2xl outline-none border border-white/10 focus:border-sky-500">
            <input id="u-pw" type="password" placeholder="Password" class="w-full bg-slate-900 p-4 rounded-2xl outline-none border border-white/10 focus:border-sky-500">
            
            <button onclick="handleAuth()" class="w-full bg-sky-600 p-4 rounded-2xl font-bold hover:bg-sky-500 transition-all shadow-lg shadow-sky-500/20">Submit</button>
            
            <p class="text-sm text-slate-500">
                <span id="toggle-text">New user?</span> 
                <button onclick="toggleView()" class="text-sky-400 font-bold ml-1 hover:underline">Create New Account</button>
            </p>
        </div>
    </div>

    <script>
        let isRegisterMode = false;

        // This function makes the "Create New Account" button work
        function toggleView() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "REGISTER" : "LOGIN";
            document.getElementById('toggle-text').innerText = isRegisterMode ? "Already have an account?" : "New user?";
        }

        // This function makes the "Submit" button work
        async function handleAuth() {
            const userId = document.getElementById('u-id').value;
            const userPw = document.getElementById('u-pw').value;
            const endpoint = isRegisterMode ? '/register' : '/login';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: userId, password: userPw})
                });

                const data = await response.json();

                if(data.success) {
                    alert(isRegisterMode ? "Registration Successful! Please Login." : "Login Success!");
                    if(!isRegisterMode) {
                        // If it's the admin, we show the database view
                        if(userId === 'admin') showAdminDashboard(data.all_users);
                        else alert("Redirecting to your dashboard...");
                    }
                } else {
                    alert("Action Failed: Check credentials.");
                }
            } catch (err) {
                alert("Server Error: Ensure Render is finished deploying.");
            }
        }

        function showAdminDashboard(users) {
            // Logic to display your admin DB would go here
            console.log("Admin Logged In:", users);
        }
    </script>
</body>
</html>
