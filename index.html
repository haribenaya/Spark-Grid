<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK GRID | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-blue { text-shadow: 0 0 15px #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div id="auth-ui" class="glass p-10 rounded-[2.5rem] w-96 text-center">
        <h2 id="title" class="text-3xl font-black italic mb-6 neon-blue uppercase">Login</h2>
        <div class="space-y-4">
            <input id="uid" type="text" placeholder="User ID" class="w-full bg-slate-900 p-4 rounded-2xl outline-none">
            <input id="upw" type="password" placeholder="Password" class="w-full bg-slate-900 p-4 rounded-2xl outline-none">
            <button onclick="auth()" class="w-full bg-sky-500 p-4 rounded-2xl font-bold">Submit</button>
            <button onclick="toggle()" class="text-sky-400 text-sm">Create New Account</button>
        </div>
    </div>

    <div id="admin-db" class="hidden glass p-10 rounded-[2.5rem] w-3/4">
        <h2 class="text-3xl font-black mb-6 italic text-amber-400">ADMIN DATABASE</h2>
        <div id="user-list" class="space-y-2"></div>
    </div>
</body>
</html>
