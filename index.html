<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spark Team | Global Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-link:hover, .active-link { background: #0ea5e9; color: white; box-shadow: 0 0 20px rgba(14, 165, 233, 0.3); }
        #login-screen { position: fixed; inset: 0; background: #020617; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex p-4 gap-4">

    <div id="login-screen">
        <div class="glass p-12 w-96 rounded-[2.5rem] text-center border-sky-500/30 shadow-2xl">
            <h1 class="text-3xl font-black mb-8 uppercase italic tracking-tighter text-white">Spark <span class="text-sky-500">Grid</span></h1>
            <input type="text" id="user" placeholder="User ID" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 text-white outline-none focus:border-sky-500">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-8 text-white outline-none focus:border-sky-500">
            <div class="flex flex-col gap-3">
                <button onclick="handleAuth(false)" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-xl font-black uppercase tracking-widest transition-all">Sign In</button>
                <button onclick="handleAuth(true)" class="w-full border border-sky-500/40 py-3 rounded-xl font-bold uppercase text-xs text-sky-400 hover:bg-sky-500/10">Create Account</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="hidden w-72 glass rounded-[2.5rem] p-8 flex flex-col justify-between">
        <div>
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center"><i class="fas fa-bolt text-white"></i></div>
                <span class="font-black text-xl uppercase">Spark <span class="text-sky-500">Team</span></span>
            </div>
            <nav class="space-y-3">
                <button onclick="showTab('overview')" id="btn-overview" class="nav-link active-link w-full text-left p-4 rounded-2xl font-bold flex items-center gap-4 transition-all"><i class="fas fa-home"></i> Overview</button>
                <button onclick="showTab('devices')" id="btn-devices" class="nav-link w-full text-left p-4 rounded-2xl font-bold flex items-center gap-4 text-slate-400 transition-all"><i class="fas fa-plug"></i> My Devices</button>
                <button onclick="showTab('data')" id="btn-data" class="nav-link w-full text-left p-4 rounded-2xl font-bold flex items-center gap-4 text-slate-400 transition-all"><i class="fas fa-table"></i> Analysis</button>
            </nav>
        </div>
        <button onclick="location.reload()" class="p-4 text-rose-500 font-bold uppercase text-xs flex items-center gap-3 hover:bg-rose-500/10 rounded-xl"><i class="fas fa-power-off"></i> Logout</button>
    </aside>

    <main id="main-ui" class="hidden flex-1 flex flex-col gap-4 overflow-y-auto pr-2">
        <section id="tab-overview" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-10 rounded-[2rem] border-b-4 border-sky-500">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-2">Total Power Load</p>
                    <h2 id="total-w" class="text-6xl font-black">0 <small class="text-sm">W</small></h2>
                </div>
                <div class="glass p-10 rounded-[2rem] border-b-4 border-emerald-500">
                    <p class="text-[10px] font-black uppercase text-slate-500 mb-2">System Status</p>
                    <h2 class="text-5xl font-black text-emerald-400 italic">ACTIVE</h2>
                </div>
            </div>
            <div id="grid-display" class="grid grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-devices" class="hidden glass p-10 rounded-[2.5rem]">
            <h2 class="text-2xl font-black mb-8">Manage Personal Devices</h2>
            <div class="flex gap-4 mb-8">
                <input type="text" id="new-dev" placeholder="Device Name (e.g. LG TV)" class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-sky-500 text-white">
                <button onclick="addDevice()" class="bg-sky-600 px-10 rounded-xl font-black uppercase text-xs">Register</button>
            </div>
            <div id="device-list" class="grid grid-cols-3 gap-4"></div>
        </section>

        <section id="tab-data" class="hidden glass p-10 rounded-[2.5rem]">
            <table class="w-full text-left">
                <thead class="text-slate-500 text-xs uppercase border-b border-white/10">
                    <tr><th class="pb-4">Device</th><th class="pb-4">Current (A)</th><th class="pb-4">Power (W)</th><th class="pb-4">Tariff</th></tr>
                </thead>
                <tbody id="analysis-table" class="font-mono text-sm"></tbody>
            </table>
        </section>
    </main>

    <script>
        let myDevices = ["Ceiling Fan", "Smart TV"];
        let ws;

        async function handleAuth(isSignUp) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const route = isSignUp ? "/signup" : "/login";
            
            try {
                const res = await fetch(route, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                if(res.ok) {
                    if(isSignUp) alert("Success! You can now Sign In.");
                    else {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('sidebar').classList.remove('hidden');
                        document.getElementById('main-ui').classList.remove('hidden');
                        startDashboard();
                    }
                } else alert("Auth Error: Check ID/Password");
            } catch(e) { alert("Server is offline!"); }
        }

        function showTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active-link', 'text-white'));
            document.getElementById('btn-' + id).classList.add('active-link', 'text-white');
        }

        function addDevice() {
            const name = document.getElementById('new-dev').value;
            if(name) { myDevices.push(name); document.getElementById('new-dev').value = ''; updateUI(); }
        }

        function updateUI() {
            document.getElementById('grid-display').innerHTML = myDevices.map(d => `
                <div class="glass p-6 rounded-2xl border-l-4 border-sky-500">
                    <p class="text-[10px] font-black uppercase text-slate-500">${d}</p>
                    <p id="val-${d.replace(/\s/g,'')}" class="text-xl font-black mt-1">0 W</p>
                </div>
            `).join('');
            
            document.getElementById('device-list').innerHTML = myDevices.map((d, i) => `
                <div class="glass p-4 rounded-xl flex justify-between items-center">
                    <span class="font-bold text-sm">${d}</span>
                    <button onclick="myDevices.splice(${i},1); updateUI()" class="text-rose-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function startDashboard() {
            updateUI();
            ws = new WebSocket('ws://' + window.location.host + '/ws/data');
            ws.onmessage = (e) => {
                let total = 0;
                let tableHTML = '';
                myDevices.forEach(d => {
                    const w = Math.floor(Math.random() * 100) + 20;
                    total += w;
                    const el = document.getElementById(`val-${d.replace(/\s/g,'')}`);
                    if(el) el.innerText = w + " W";
                    tableHTML += `<tr class="border-b border-white/5"><td class="py-4 font-bold">${d}</td><td class="py-4">${(w/230).toFixed(2)}A</td><td class="py-4 text-sky-400 font-bold">${w}W</td><td class="py-4 text-emerald-400">₹${(w*0.0075).toFixed(2)}</td></tr>`;
                });
                document.getElementById('total-w').innerText = total;
                document.getElementById('analysis-table').innerHTML = tableHTML;
            };
        }
    </script>
</body>
</html>
